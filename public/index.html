<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>তিন দানা — Tin Dana</title>
<meta name="description" content="A real-time online two-player Bengali strategy board game.">
<link rel="stylesheet" href="/styles.css">
</head>
<body data-lang="bn">
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 id="app-title">তিন দানা</h1>
        <span class="tagline" id="app-tagline">একটি ঐতিহ্যবাহী কৌশলের খেলা</span>
      </div>
      <div class="header-controls">
        <span id="nickname-display" class="tagline" aria-hidden="false"></span>
        <button type="button" id="lang-toggle" class="pill-button" aria-label="Switch language">বাংলা / English</button>
      </div>
    </header>

    <main id="view-root" role="main"></main>
  </div>

  <!-- Accessible live region: turn changes, timers-not-announced-every-tick,
       results, connection status. Visually hidden, read by screen readers. -->
  <div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <script src="/i18n.js"></script>
  <script src="/board.js"></script>
  <script src="/app.js"></script>
</body>
</html>
